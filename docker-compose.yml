version: '3.8'

services:
  # Local LLM Server (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: autonomous_agent_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Autonomous Agent API
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autonomous_agent_api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=llama3.2
      - LOG_LEVEL=INFO
    volumes:
      - agent_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ollama_data:
  agent_data:

networks:
  default:
    name: autonomous_agent_network
