version: '3.8'

services:
  # Autonomous Agent API
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autonomous_agent_api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - agent_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  agent_data:

networks:
  default:
    name: autonomous_agent_network
